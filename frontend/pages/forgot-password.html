<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - FoodZap</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: var(--lg);
    }
    
    .auth-box {
      background: white;
      border-radius: var(--radius-xl);
      padding: var(--xl);
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-xl);
      text-align: center;
    }
    
    .auth-logo {
      margin-bottom: var(--lg);
    }
    
    .auth-logo .logo-icon {
      font-size: 3rem;
    }
    
    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: var(--sm);
    }
    
    .auth-subtitle {
      color: var(--gray);
      margin-bottom: var(--lg);
    }
    
    .form-group {
      margin-bottom: var(--md);
      text-align: left;
    }
    
    .form-label {
      display: block;
      margin-bottom: var(--xs);
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .form-input {
      width: 100%;
      padding: var(--sm) var(--md);
      border: 2px solid var(--light-gray);
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .input-group {
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: var(--md);
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }
    
    .input-group .form-input {
      padding-left: 2.5rem;
    }
    
    .btn-full {
      width: 100%;
    }
    
    .back-link {
      margin-top: var(--lg);
      padding-top: var(--lg);
      border-top: 1px solid var(--light-gray);
    }
    
    .back-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    
    .success-message {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: var(--md);
      border-radius: var(--radius-md);
      margin-bottom: var(--lg);
    }
    
    .success-message i {
      font-size: 3rem;
      margin-bottom: var(--sm);
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-logo">
        <span class="logo-icon">🍕</span>
        <h1 style="font-size: 1.5rem; margin-top: var(--sm);">FoodZap</h1>
      </div>
      
      <div id="formSection">
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
        
        <form id="forgotForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" class="form-input" id="email" placeholder="Enter your email" required>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-full" id="submitBtn">
            <i class="fas fa-paper-plane"></i> Send Reset Link
          </button>
        </form>
      </div>
      
      <div id="successSection" class="success-message">
        <i class="fas fa-check-circle"></i>
        <h3>Check Your Email!</h3>
        <p>We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>
        <a href="login.html" class="btn btn-primary btn-full" style="margin-top: var(--md);">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
      
      <div class="back-link">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
      
      try {
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        // Show success
        document.getElementById('formSection').style.display = 'none';
        document.querySelector('.back-link').style.display = 'none';
        document.getElementById('successSection').style.display = 'block';
        
      } catch (error) {
        Utils.showToast('Failed to send reset link. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
      }
    });
  </script>
</body>
</html>
